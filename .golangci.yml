# golangci-lint configuration for hexlet-go-crawler.
# Compatible with golangci-lint v2.
version: "2"

# Runner settings.
run:
  # Maximum time allowed for a single linter run.
  timeout: 5m
  # Resolve file paths relative to go.mod for consistent CI/local behavior.
  relative-path-mode: gomod
  # Include test files in analysis.
  tests: true

# Linter configuration.
linters:
  # Start with the standard preset (fast, reliable linters).
  default: standard
  
  # Project-specific linters for additional coverage.
  enable:
    - errcheck          # Detect unchecked errors (critical for network code).
    - govet             # Flag suspicious Go constructs.
    - staticcheck       # Advanced static analysis beyond the compiler.
    - unused            # Identify unused code, variables, or parameters.
    - ineffassign       # Detect ineffective assignments.
    - goconst           # Suggest constants for repeated string literals.
    - gocyclo           # Enforce cyclomatic complexity limits.
    - gosec             # Security-focused checks (SQLi, path traversal, etc.).
    - noctx             # Ensure context is passed to HTTP requests.
    - bodyclose         # Ensure HTTP response bodies are closed.
    - whitespace        # Detect unnecessary whitespace.
  
  # Per-linter settings.
  settings:
    errcheck:
      # Do not ignore type assertions or blank assignments by default.
      check-type-assertions: false
      check-blank: false
      # Allow ignoring errors for explicitly safe operations.
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
    
    govet:
      # Enable additional govet analyzers.
      enable:
        - shadow   # Detect variable shadowing.
        - nilness  # Detect potential nil pointer dereferences.
    
    gosec:
      # Minimum severity and confidence to report issues.
      severity: medium
      confidence: medium
    
    gocyclo:
      # Maximum allowed cyclomatic complexity per function.
      min-complexity: 15
    
    goconst:
      # Minimum length and occurrence count for string literal suggestions.
      min-len: 3
      min-occurrences: 3

  # Exclusion rules for known false positives or acceptable patterns.
  exclusions:
    # Enable preset exclusion groups for common false positives.
    presets:
      - common-false-positives
      - std-error-handling
    
    # Custom exclusion rules.
    rules:
      # Relax certain checks in test files.
      - path: _test\.go
        linters:
          - gocyclo
          - gosec
          - errcheck  # Allow ignoring errors for Close/Write in tests.
      
      # Allow unchecked errors for CLI helper functions in cmd/.
      - path: cmd/.+
        text: "Error return value of `cli\\.ShowAppHelp`"
        linters:
          - errcheck
      
      # Allow ignoring errors from resp.Body.Close() in defer statements.
      # The error is rarely actionable and defers run at function exit.
      - path: .+\.go
        text: "Error return value of `.+.Close`"
        linters:
          - errcheck

# Output formatting.
output:
  formats:
    text:
      colors: true
      print-linter-name: true
      print-issued-lines: true
  # Sort issues by file path, then line number.
  sort-order:
    - file
    - linter

# Severity mapping for CI integration.
severity:
  default: warning
  rules:
    # Treat security and static analysis issues as errors.
    - linters:
        - gosec
        - staticcheck
      severity: error